  <h1>作品一：简洁个人网站生成器</h1>
  <p>这是一个用 Python 编写的命令行工具，可以帮助你在几分钟内搭建一个极简风格的静态个人网站。</p>
  <h2>功能特点</h2>
  <ul>
    <li>自动生成 HTML 文件结构</li>
    <li>支持 Markdown 转换为 HTML</li>
    <li>内置开发服务器实时预览</li>
  </ul>
  <h2>使用方法</h2>
  <pre><code>$ pip install simple-site-gen
$ simple-site new my-site
$ cd my-site
$ simple-site build</code></pre>
